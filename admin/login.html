<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orhanpaşa Belediyesi - Resmi Web Sitesi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-4 login-card">
      <h1 class="h4 mb-3">Yönetim Girişi</h1>
  <p class="text-muted mb-4">Kullanıcı adı: admin, Şifre: 1234</p>
      <form id="login-form" class="row g-3">
        <div class="col-12">
          <label class="form-label">Kullanıcı Adı</label>
          <input class="form-control" name="username" required>
        </div>
        <div class="col-12">
          <label class="form-label">Şifre</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-primary" type="submit">Giriş yap</button>
        </div>
        <div class="col-12">
          <div id="login-alert" class="alert alert-danger d-none mb-0"></div>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('login-alert');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const u = form.username.value.trim();
      const p = form.password.value.trim();
      if (u === 'admin' && p === '1234') {
        localStorage.setItem('admin_token', 'mock-token');
        window.location.href = 'index.html';
      } else {
        alertBox.textContent = 'Hatalı kullanıcı adı veya şifre';
        alertBox.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
