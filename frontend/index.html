<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <meta name="description" content="" />
  <script>
    (function() {
      var apiBase = window.location.origin.indexOf('localhost') !== -1 || window.location.origin.indexOf('127.0.0.1') !== -1
        ? 'http://localhost:4000'
        : window.location.origin;
      fetch(apiBase + '/api/v1/settings')
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res && res.success && res.data) {
            var title = res.data.seo_meta_title || res.data.general_site_name || '';
            if (title) document.title = title;
            var desc = res.data.seo_meta_description || res.data.general_site_description || '';
            var meta = document.querySelector('meta[name="description"]');
            if (meta) meta.setAttribute('content', desc);
            var fav = res.data.general_favicon;
            if (fav) {
              var url = fav.indexOf('http') === 0 ? fav : (fav.indexOf('/uploads') === 0 ? apiBase + fav : fav);
              var links = document.querySelectorAll('link[rel*="icon"], link[rel="apple-touch-icon"]');
              for (var i = 0; i < links.length; i++) {
                links[i].setAttribute('href', url);
              }
            }
          }
        })
        .catch(function(e) { console.error(e); });
    })();
  </script>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-icon-180x180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
